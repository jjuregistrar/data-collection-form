<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Student Information Collection</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --light: #f8fafc;
      --dark: #1e293b;
      --gray-100: #f1f5f9;
      --gray-200: #e2e8f0;
      --gray-300: #cbd5e1;
      --gray-600: #475569;
      --gray-700: #334155;
      --gray-800: #1e293b;
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      --radius: 16px;
      --radius-sm: 10px;
      --transition: all 0.3s ease;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container { max-width: 700px; margin: 0 auto; }

    .header {
      text-align: center;
      margin-bottom: 30px;
      padding-top: 10px;
    }

    .header-icon {
      background: white;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      box-shadow: var(--shadow-lg);
    }

    .header-icon i {
      font-size: 36px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header h1 {
      font-size: 2rem;
      font-weight: 800;
      color: white;
      margin-bottom: 8px;
    }

    .header p { color: rgba(255, 255, 255, 0.9); }

    .form-container {
      background: white;
      border-radius: var(--radius);
      padding: 40px 30px;
      box-shadow: var(--shadow-lg);
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: var(--gray-800);
      font-size: 0.95rem;
    }

    .form-label.required::after {
      content: '*';
      color: var(--danger);
      margin-left: 4px;
    }

    .form-input, .form-select {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid var(--gray-200);
      border-radius: var(--radius-sm);
      font-size: 1rem;
      font-family: inherit;
      transition: var(--transition);
    }

    .form-input:focus, .form-select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
    }

    .form-input.error, .form-select.error {
      border-color: var(--danger);
    }

    .form-input.success {
      border-color: var(--success);
    }

    .student-info-card {
      background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
      border-radius: var(--radius-sm);
      padding: 20px;
      margin: 20px 0;
      border: 2px solid var(--primary);
    }

    .student-info-card h3 {
      color: var(--primary);
      margin-bottom: 15px;
      font-size: 1.1rem;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
    }

    .info-item {
      display: flex;
      flex-direction: column;
    }

    .info-label {
      font-size: 0.75rem;
      color: var(--gray-600);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .info-value {
      font-weight: 600;
      color: var(--gray-800);
      font-size: 0.95rem;
    }

    .error-message {
      color: var(--danger);
      font-size: 0.85rem;
      margin-top: 6px;
      display: none;
    }

    .submit-btn {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      padding: 18px 48px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .submit-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .loading-spinner {
      display: none;
      text-align: center;
      margin-top: 20px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid var(--gray-200);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .response-message {
      padding: 20px;
      border-radius: var(--radius-sm);
      margin: 20px 0;
      text-align: center;
      display: none;
    }

    .response-success {
      background-color: rgba(16, 185, 129, 0.1);
      border: 1px solid var(--success);
      color: var(--success);
    }

    .response-error {
      background-color: rgba(239, 68, 68, 0.1);
      border: 1px solid var(--danger);
      color: var(--danger);
    }

    @media (max-width: 640px) {
      .form-container { padding: 25px 20px; }
      .header h1 { font-size: 1.5rem; }
      .info-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-icon">
        <i class="fas fa-graduation-cap"></i>
      </div>
      <h1>Student Information Collection</h1>
      <p>Please verify your identity and provide additional information</p>
    </div>

    <div id="responseMessage" class="response-message"></div>

    <div class="form-container">
      <!-- Verification Section -->
      <div id="verificationSection">
        <div class="form-group">
          <label for="studentId" class="form-label required">
            <i class="fas fa-id-card"></i> Student ID
          </label>
          <input type="text" id="studentId" class="form-input" placeholder="Enter your Student ID" maxlength="50">
          <div class="error-message" id="studentIdError">Please enter a valid Student ID</div>
        </div>

        <div class="form-group">
          <label for="admissionNumber" class="form-label required">
            <i class="fas fa-hashtag"></i> Admission Number
          </label>
          <input type="text" id="admissionNumber" class="form-input" placeholder="Enter your Admission Number" maxlength="50">
          <div class="error-message" id="admissionNumberError">Please enter a valid Admission Number</div>
        </div>

        <button type="button" id="verifyBtn" class="submit-btn">
          <i class="fas fa-search"></i> Verify Identity
        </button>
      </div>

      <!-- Student Info Display (Hidden initially) -->
      <div id="studentInfoSection" style="display: none;">
        <div class="student-info-card">
          <h3><i class="fas fa-user-check"></i> Verified Student Information</h3>
          <div class="info-grid" id="studentInfoGrid"></div>
        </div>

        <div class="form-group">
          <label for="fanNumber" class="form-label required">
            <i class="fas fa-qrcode"></i> FAN Number
          </label>
          <input type="text" id="fanNumber" class="form-input" placeholder="Enter your FAN Number" maxlength="50">
          <div class="error-message" id="fanNumberError">Please enter a valid FAN Number</div>
        </div>

        <div class="form-group">
          <label for="phoneNumber" class="form-label required">
            <i class="fas fa-phone"></i> Phone Number
          </label>
          <input type="tel" id="phoneNumber" class="form-input" placeholder="Enter your phone number">
          <div class="error-message" id="phoneNumberError">Please enter a valid phone number (10-15 digits)</div>
        </div>

        <button type="button" id="submitBtn" class="submit-btn">
          <i class="fas fa-paper-plane"></i> Submit Information
        </button>
      </div>

      <div class="loading-spinner" id="loadingSpinner">
        <div class="spinner"></div>
        <p style="margin-top: 10px;">Processing...</p>
      </div>
    </div>
  </div>

  <script>
    // ==================== CONFIGURATION ====================
    // Update these URLs with your actual GitHub raw content URL and Apps Script URL
    const GITHUB_DATA_URL = 'https://raw.githubusercontent.com/jjuregistrar/data-collection-form/refs/heads/main/students.csv'; // Change this
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzaFmqL_TyKQCgIoqz3cBbRe5RtCTAXKPcvCt-v6hJdkWn9V10FV6aPQDh8zlTDeBUW_g/exec'; // Change this
    
    // Student data cache
    let studentsData = [];
    let currentStudent = null;
    
    // ==================== DOM Elements ====================
    const verificationSection = document.getElementById('verificationSection');
    const studentInfoSection = document.getElementById('studentInfoSection');
    const studentInfoGrid = document.getElementById('studentInfoGrid');
    const verifyBtn = document.getElementById('verifyBtn');
    const submitBtn = document.getElementById('submitBtn');
    const loadingSpinner = document.getElementById('loadingSpinner');
    const responseMessage = document.getElementById('responseMessage');
    
    const studentIdInput = document.getElementById('studentId');
    const admissionNumberInput = document.getElementById('admissionNumber');
    const fanNumberInput = document.getElementById('fanNumber');
    const phoneNumberInput = document.getElementById('phoneNumber');
    
    // ==================== Load Student Data from GitHub ====================
    async function loadStudentData() {
      console.log('Loading student data from GitHub...');
      showLoading(true);
      
      try {
        // Try CSV format first
        let response = await fetch(GITHUB_DATA_URL);
        
        if (!response.ok) {
          // Try JSON format if CSV fails
          response = await fetch(GITHUB_DATA_URL.replace('.csv', '.json'));
        }
        
        const data = await response.text();
        
        // Parse CSV data
        if (GITHUB_DATA_URL.endsWith('.csv')) {
          studentsData = parseCSV(data);
        } else {
          studentsData = JSON.parse(data);
        }
        
        console.log(`Loaded ${studentsData.length} student records`);
        showResponse(`Loaded ${studentsData.length} student records successfully`, 'success');
        setTimeout(() => hideResponse(), 2000);
        
      } catch (error) {
        console.error('Error loading student data:', error);
        showResponse('Failed to load student data. Please check your internet connection and try again.', 'error');
        
        // Load sample data for testing
        loadSampleData();
      } finally {
        showLoading(false);
      }
    }
    
    // Parse CSV data
    function parseCSV(csvText) {
      const lines = csvText.trim().split('\n');
      const headers = lines[0].split(',').map(h => h.trim());
      
      const students = [];
      for (let i = 1; i < lines.length; i++) {
        const values = lines[i].split(',').map(v => v.trim());
        const student = {};
        headers.forEach((header, index) => {
          student[header] = values[index] || '';
        });
        students.push(student);
      }
      
      return students;
    }
    
    // Load sample data for testing (remove in production)
    function loadSampleData() {
      studentsData = [
        {
          Stream: 'Science',
          Studentid: 'S001',
          'Admission Number': 'ADM2024001',
          'First Name': 'John',
          'Father Name': 'Michael',
          'Grand Father Name': 'Thomas',
          Gender: 'Male',
          Isblind: 'No',
          Isdeaf: 'No'
        },
        {
          Stream: 'Arts',
          Studentid: 'S002',
          'Admission Number': 'ADM2024002',
          'First Name': 'Sarah',
          'Father Name': 'David',
          'Grand Father Name': 'James',
          Gender: 'Female',
          Isblind: 'No',
          Isdeaf: 'No'
        }
      ];
      console.log('Sample data loaded for testing');
    }
    
    // ==================== Verification ====================
    function verifyStudent() {
      const studentId = studentIdInput.value.trim();
      const admissionNumber = admissionNumberInput.value.trim();
      
      // Clear previous errors
      clearErrors();
      
      // Validate inputs
      if (!studentId) {
        showFieldError('studentIdError', 'Please enter your Student ID');
        return;
      }
      
      if (!admissionNumber) {
        showFieldError('admissionNumberError', 'Please enter your Admission Number');
        return;
      }
      
      // Find student
      const student = studentsData.find(s => 
        (s.Studentid === studentId || s.Studentid?.toString() === studentId) &&
        (s['Admission Number'] === admissionNumber || s['Admission Number']?.toString() === admissionNumber)
      );
      
      if (!student) {
        showResponse('❌ Invalid Student ID or Admission Number. Please check and try again.', 'error');
        return;
      }
      
      // Student found
      currentStudent = student;
      displayStudentInfo(student);
      
      // Switch to info section
      verificationSection.style.display = 'none';
      studentInfoSection.style.display = 'block';
      
      showResponse('✅ Identity verified! Please provide your FAN Number and Phone Number.', 'success');
      setTimeout(() => hideResponse(), 3000);
    }
    
    // Display student information
    function displayStudentInfo(student) {
      const fieldsToShow = [
        { label: 'Stream', value: student.Stream },
        { label: 'Student ID', value: student.Studentid },
        { label: 'Admission Number', value: student['Admission Number'] },
        { label: 'Full Name', value: `${student['First Name'] || ''} ${student['Father Name'] || ''} ${student['Grand Father Name'] || ''}`.trim() },
        { label: 'Gender', value: student.Gender },
        { label: 'Status', value: `${student.Isblind === 'Yes' ? 'Blind, ' : ''}${student.Isdeaf === 'Yes' ? 'Deaf' : 'Normal'}`.replace(/,\s*$/, '') || 'Normal' }
      ];
      
      studentInfoGrid.innerHTML = fieldsToShow
        .filter(field => field.value)
        .map(field => `
          <div class="info-item">
            <span class="info-label">${field.label}</span>
            <span class="info-value">${field.value}</span>
          </div>
        `).join('');
    }
    
    // ==================== Form Submission ====================
// ==================== Form Submission - FIXED VERSION ====================
async function submitData() {
  const fanNumber = fanNumberInput.value.trim();
  const phoneNumber = phoneNumberInput.value.trim();
  
  // Clear previous errors
  clearErrors();
  
  // Validate FAN Number
  if (!fanNumber) {
    showFieldError('fanNumberError', 'Please enter your FAN Number');
    fanNumberInput.focus();
    return;
  }
  
  if (fanNumber.length < 3) {
    showFieldError('fanNumberError', 'FAN Number must be at least 3 characters');
    fanNumberInput.focus();
    return;
  }
  
  // Validate Phone Number
  if (!phoneNumber) {
    showFieldError('phoneNumberError', 'Please enter your phone number');
    phoneNumberInput.focus();
    return;
  }
  
  const phoneRegex = /^[\+]?[0-9\s\-\(\)]{10,15}$/;
  if (!phoneRegex.test(phoneNumber)) {
    showFieldError('phoneNumberError', 'Please enter a valid phone number (10-15 digits)');
    phoneNumberInput.focus();
    return;
  }
  
  // Prepare data for submission
  const submissionData = {
    timestamp: new Date().toISOString(),
    Stream: currentStudent.Stream || '',
    Studentid: currentStudent.Studentid || '',
    'Admission Number': currentStudent['Admission Number'] || '',
    'FAN Number': fanNumber,
    'First Name': currentStudent['First Name'] || '',
    'Father Name': currentStudent['Father Name'] || '',
    'Grand Father Name': currentStudent['Grand Father Name'] || '',
    Gender: currentStudent.Gender || '',
    Isblind: currentStudent.Isblind || 'No',
    Isdeaf: currentStudent.Isdeaf || 'No',
    'Phone Number': phoneNumber,
    submission_status: 'COMPLETED'
  };
  
  // Submit to Google Sheets
  showLoading(true);
  submitBtn.disabled = true;
  
  try {
    // Method 1: Try using FormData instead of JSON (bypasses CORS issues)
    const formData = new FormData();
    Object.keys(submissionData).forEach(key => {
      formData.append(key, submissionData[key]);
    });
    
    const response = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors', // Important: Use no-cors mode
      body: formData
    });
    
    // When using no-cors, we can't read the response, so assume success
    // The data will still be submitted to Google Sheets
    showResponse('✅ Thank you! Your information has been successfully submitted.', 'success');
    
    // Reset form after success
    setTimeout(() => {
      resetForm();
    }, 2000);
    
  } catch (error) {
    console.error('Submission error:', error);
    showResponse('❌ Submission failed. Please try again or contact support.', 'error');
  } finally {
    showLoading(false);
    submitBtn.disabled = false;
  }
}
    
    // Reset form to initial state
    function resetForm() {
      studentIdInput.value = '';
      admissionNumberInput.value = '';
      fanNumberInput.value = '';
      phoneNumberInput.value = '';
      currentStudent = null;
      
      verificationSection.style.display = 'block';
      studentInfoSection.style.display = 'none';
      
      setTimeout(() => hideResponse(), 3000);
    }
    
    // ==================== Helper Functions ====================
    function showFieldError(elementId, message) {
      const errorElement = document.getElementById(elementId);
      if (errorElement) {
        errorElement.textContent = message;
        errorElement.style.display = 'block';
      }
    }
    
    function clearErrors() {
      const errorElements = document.querySelectorAll('.error-message');
      errorElements.forEach(el => el.style.display = 'none');
    }
    
    function showResponse(message, type) {
      responseMessage.textContent = message;
      responseMessage.className = `response-message response-${type}`;
      responseMessage.style.display = 'block';
      
      if (type === 'error') {
        setTimeout(() => hideResponse(), 5000);
      }
    }
    
    function hideResponse() {
      responseMessage.style.display = 'none';
    }
    
    function showLoading(show) {
      loadingSpinner.style.display = show ? 'block' : 'none';
    }
    
    // ==================== Event Listeners ====================
    verifyBtn.addEventListener('click', verifyStudent);
    submitBtn.addEventListener('click', submitData);
    
    // Enter key support
    studentIdInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') verifyStudent();
    });
    admissionNumberInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') verifyStudent();
    });
    fanNumberInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') submitData();
    });
    phoneNumberInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') submitData();
    });
    
    // ==================== Initialize ====================
    async function init() {
      showLoading(true);
      await loadStudentData();
      showLoading(false);
    }
    
    init();
  </script>
</body>
</html>
